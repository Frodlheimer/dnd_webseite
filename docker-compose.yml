services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd-vtt-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      POSTGRES_DB: dnd_vtt
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
